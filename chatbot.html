<!DOCTYPE html>
<html>

<head>
    <title>Customer Support Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }

        .chatbox {
            width: 400px;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 15px;
            border: 1px solid gray;
        }

        #chat {
            height: 300px;
            border: 1px solid gray;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        input {
            width: 75%;
            padding: 8px;
        }

        button {
            padding: 8px;
        }
    </style>

</head>

<body>

    <div class="chatbox">

        <h2 align="center">Shopping Chatbot</h2>

        <div id="chat">
            <p><b>Bot:</b> Hello! How can I help you?</p>
        </div>

        <input type="text" id="msg" placeholder="Enter message">
        <button onclick="sendMessage()">Send</button>

    </div>

    <script>

        var FAQ = {

            order: "Your order will arrive in 3-5 days.",

            return: "You can return the product within 7 days.",

            payment: "We accept UPI, Cards and Cash on Delivery.",

            contact: "Call us on 1800-123-456.",

            discount: "Use SAVE10 to get 10% discount.",

            shipping: "Free shipping above ₹499.",

            hello: "Hello Customer!",

            bye: "Thank you for visiting."

        };

        function sendMessage() {
            var input = document.getElementById("msg");
            var text = input.value.toLowerCase();

            var chat = document.getElementById("chat");

            if (text == "")
                return;

            chat.innerHTML += "<p><b>You:</b> " + text + "</p>";

            var reply = "Sorry, I did not understand.";

            if (text.includes("order")) {
                reply = FAQ.order;
            }

            else if (text.includes("return")) {
                reply = FAQ.return;
            }

            else if (text.includes("payment")) {
                reply = FAQ.payment;
            }

            else if (text.includes("contact")) {
                reply = FAQ.contact;
            }

            else if (text.includes("discount")) {
                reply = FAQ.discount;
            }

            else if (text.includes("shipping")) {
                reply = FAQ.shipping;
            }

            else if (text.includes("hello") || text.includes("hi")) {
                reply = FAQ.hello;
            }

            else if (text.includes("bye")) {
                reply = FAQ.bye;
            }

            chat.innerHTML += "<p><b>Bot:</b> " + reply + "</p>";

            input.value = "";

            chat.scrollTop = chat.scrollHeight;
        }

    </script>

</body>

</html>
